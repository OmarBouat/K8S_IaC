version: "3.8"

services:
  jenkins:
    build:
      context: ./jenkins
    image: k8s-lab/jenkins:latest
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - /opt/tools/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  gitea:
    build:
      context: ./gitea
    image: k8s-lab/gitea:latest
    container_name: gitea
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - /opt/tools/gitea:/data

  nexus:
    build:
      context: ./nexus
    image: k8s-lab/nexus:latest
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - /opt/tools/nexus/data:/nexus-data
