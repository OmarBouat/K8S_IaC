apiVersion: v1
kind: PersistentVolume
metadata:
  name: devops-tools-nfs-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.56.20
    path: /srv/nfs/share
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: devops-tools-nfs-pvc
  namespace: devops-tools
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 20Gi
