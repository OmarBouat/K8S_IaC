apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-site
  namespace: devops-tools
data:
  index.html: |
    <!doctype html>
    <html>
    <head>
      <meta charset="utf-8" />
      <title>K8s Frontend</title>
      <style>
        body { font-family: sans-serif; margin: 2rem; }
        h1 { color: #0d47a1; }
      </style>
    </head>
    <body>
      <h1>Frontend running on Kubernetes</h1>
      <p>This service is deployed by Jenkins directly into Kubernetes.</p>
      <script src="app.js"></script>
    </body>
    </html>
  styles.css: |
    body {
      font-family: sans-serif;
      margin: 2rem;
    }
  app.js: |
    console.log('frontend-site configmap loaded');
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-ci
  namespace: devops-tools
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-ci-role
  namespace: devops-tools
rules:
  - apiGroups: [""]
    resources: ["configmaps", "pods", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-ci-rolebinding
  namespace: devops-tools
subjects:
  - kind: ServiceAccount
    name: jenkins-ci
    namespace: devops-tools
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-ci-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: devops-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins-ci
      imagePullSecrets:
        - name: nexus-registry
      nodeSelector:
        kubernetes.io/hostname: worker2
      initContainers:
        - name: init-jenkins-home
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data/jenkins /data/jenkins/init.groovy.d && chown -R 1000:1000 /data/jenkins"]
          volumeMounts:
            - name: shared-data
              mountPath: /data
      containers:
        - name: jenkins
          image: 192.168.56.20:8082/k8s-jenkins:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
            - containerPort: 50000
          env:
            - name: JENKINS_OPTS
              value: --prefix=/jenkins
            - name: DOCKER_HOST
              value: tcp://192.168.56.20:2375
            - name: NEXUS_USER
              valueFrom:
                secretKeyRef:
                  name: nexus-credentials
                  key: username
            - name: NEXUS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexus-credentials
                  key: password
          volumeMounts:
            - name: shared-data
              mountPath: /var/jenkins_home
              subPath: jenkins
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: devops-tools-nfs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: devops-tools
spec:
  type: ClusterIP
  selector:
    app: jenkins
  ports:
    - name: web
      port: 8080
      targetPort: 8080
    - name: agent
      port: 50000
      targetPort: 50000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jenkins
  namespace: devops-tools
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /jenkins
            pathType: Prefix
            backend:
              service:
                name: jenkins
                port:
                  number: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devops-tools
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: nexus-registry
      containers:
        - name: frontend
          image: 192.168.56.20:8082/k8s-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_API_URL
              value: "http://backend.192.168.56.240.nip.io"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes: []
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: devops-tools
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: web
      port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: devops-tools
spec:
  ingressClassName: nginx
  rules:
    - host: frontend.192.168.56.240.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
