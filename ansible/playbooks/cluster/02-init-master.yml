---
- name: Initialize control plane
  hosts: k8s_master
  become: true
  tasks:
    - name: Initialize Kubernetes cluster
      ansible.builtin.command: >-
        kubeadm init
        --apiserver-advertise-address={{ ansible_host }}
        --pod-network-cidr={{ pod_network_cidr }}
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Create kube directory for vagrant user
      ansible.builtin.file:
        path: /home/vagrant/.kube
        state: directory
        owner: vagrant
        group: vagrant
        mode: '0755'

    - name: Copy admin kubeconfig for vagrant user
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/vagrant/.kube/config
        remote_src: true
        owner: vagrant
        group: vagrant
        mode: '0644'

    - name: Apply Flannel CNI
      ansible.builtin.command: >-
        kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: false

    - name: Ensure Flannel daemonset uses host-only interface
      ansible.builtin.shell: |
        if ! kubectl -n kube-flannel get ds kube-flannel-ds -o jsonpath='{.spec.template.spec.containers[0].args}' | grep -q -- '--iface=eth1'; then
          kubectl -n kube-flannel patch ds kube-flannel-ds --type='json' -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--iface=eth1"}]'
        fi
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: false

    - name: Get kubeadm join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: kubeadm_join_cmd
      changed_when: false

    - name: Store join command as host fact
      ansible.builtin.set_fact:
        join_command: "{{ kubeadm_join_cmd.stdout }}"
