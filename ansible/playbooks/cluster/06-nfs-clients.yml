---
- name: Configure NFS clients on cluster nodes
  hosts: k8s_cluster
  become: true
  tasks:
    - name: Install NFS client package
      ansible.builtin.apt:
        name: nfs-common
        state: present
        update_cache: true

    - name: Create NFS mount point
      ansible.builtin.file:
        path: /mnt/nfs
        state: directory
        mode: '0755'

    - name: Configure persistent NFS mount in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^192\.168\.56\.20:/srv/nfs/share\s+/mnt/nfs\s+nfs\s+defaults,_netdev\s+0\s+0$'
        line: '192.168.56.20:/srv/nfs/share /mnt/nfs nfs defaults,_netdev 0 0'

    - name: Ensure NFS share is mounted
      ansible.builtin.shell: |
        if mountpoint -q /mnt/nfs; then
          exit 0
        fi
        mount /mnt/nfs
        exit 10
      register: nfs_mount
      changed_when: nfs_mount.rc == 10
      failed_when: nfs_mount.rc not in [0, 10]