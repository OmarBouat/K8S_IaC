---
- name: Install and configure tools VM services
  hosts: k8s_tools
  become: true
  tasks:
    - name: Install Docker and NFS packages
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
          - nfs-kernel-server
        state: present
        update_cache: true

    - name: Ensure docker service is enabled and running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Ensure nfs-kernel-server service is enabled and running
      ansible.builtin.systemd:
        name: nfs-kernel-server
        state: started
        enabled: true

    - name: Add vagrant user to docker group
      ansible.builtin.user:
        name: vagrant
        groups: docker
        append: true

    - name: Create NFS export directory
      ansible.builtin.file:
        path: /srv/nfs/share
        state: directory
        owner: nobody
        group: nogroup
        mode: '0777'

    - name: Configure NFS export
      ansible.builtin.lineinfile:
        path: /etc/exports
        line: "/srv/nfs/share 192.168.56.0/24(rw,sync,no_subtree_check,no_root_squash)"
        create: true
      register: nfs_export

    - name: Reload NFS exports
      ansible.builtin.command: exportfs -ra
      changed_when: false
      when: nfs_export.changed

    - name: Create Gitea data directory
      ansible.builtin.file:
        path: /opt/tools/gitea
        state: directory
        owner: vagrant
        group: vagrant
        mode: '0755'

    - name: Create Nexus data directory
      ansible.builtin.file:
        path: /opt/tools/nexus/data
        state: directory
        owner: '200'
        group: '200'
        mode: '0755'
        recurse: true

    - name: Create Jenkins home directory
      ansible.builtin.file:
        path: /opt/tools/jenkins_home
        state: directory
        owner: '1000'
        group: '1000'
        mode: '0755'
        recurse: true

    - name: Detect available compose command
      ansible.builtin.shell: |
        if docker compose version >/dev/null 2>&1; then
          echo "docker compose"
        elif command -v docker-compose >/dev/null 2>&1; then
          echo "docker-compose"
        else
          echo "No compose command found" >&2
          exit 1
        fi
      register: compose_cmd
      changed_when: false

    - name: Remove existing service containers to avoid name conflicts
      ansible.builtin.shell: |
        for c in jenkins gitea nexus; do
          docker rm -f "$c" 2>/dev/null || true
        done
      register: removed_conflicts
      changed_when: removed_conflicts.stdout | trim | length > 0

    - name: Build and start Docker services from compose definition
      ansible.builtin.shell: "{{ compose_cmd.stdout }} -f /vagrant/docker/docker-compose.tools.yml up -d --build"
      args:
        chdir: /vagrant/docker
